apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: taskflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: bhargav072/taskflow-api
          ports:
            - containerPort: 4000
          env:
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: supabase-secret
                  key: supabase-url
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secret
                  key: supabase-service-role-key
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secret
                  key: supabase-anon-key
            - name: PORT
              value: "4000"
          resources:
            requests:
              cpu: 256m
              memory: 512Mi
