name: Project 1 - Hello Pipeline

on:
  push:
    branches: [main]
    paths:
      - "project-1-hello-pipeline/**"
      - ".github/workflows/project-1-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "project-1-hello-pipeline/**"
      - ".github/workflows/project-1-ci.yml"

defaults:
  run:
    working-directory: project-1-hello-pipeline

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: flake8 .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest -v
