name: CI

on:
  push:
    branches: [main]
    paths:
      - "project-1-hello-pipeline/**"
      - ".github/workflows/project-1-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "project-1-hello-pipeline/**"
      - ".github/workflows/project-1-ci.yml"

defaults:
  run:
    working-directory: project-1-hello-pipeline

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: flake8 .

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run tests with coverage
        run: pytest -v --cov --cov-report=term --cov-report=html
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 7
