name: Task Flow

on:
  push:
    branches: ["**"]
    paths:
      - "project-2-task-flow/**"
      - ".github/workflows/project-2-task-flow.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "project-2-task-flow/**"
      - ".github/workflows/project-2-task-flow.yml"
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true

defaults:
  run:
    working-directory: project-2-task-flow

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          # cache: "npm"
          # cache-dependency-path: project-2-task-flow/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  test:
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          # cache: "npm"
          # cache-dependency-path: project-2-task-flow/package-lock.json
      - run: npm ci
      - run: npm test

  gitleaks:
    needs: test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Clean gitleaks temp files on runner
        run: |
          # remove stale temp file used by the gitleaks action installer
          rm -f /tmp/gitleaks.tmp || true
          rm -rf /tmp/gitleaks-* || true
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sonarqube:
    needs: gitleaks
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: project-2-task-flow/package-lock.json
      - run: npm ci
      - run: npm run build -w apps/api
      - run: npm run build -w apps/web
      - uses: sonarsource/sonarqube-scan-action@v5
        with:
           projectBaseDir: project-2-task-flow
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  docker-build:
      needs: sonarqube
      runs-on: self-hosted
      steps:
       - uses: actions/checkout@v4
       - uses: docker/setup-buildx-action@v3
       - name: Build API
         uses: docker/build-push-action@v6
         with:
           context: project-2-task-flow
           file: project-2-task-flow/apps/api/Dockerfile
           load: true
           tags: taskflow-api:${{ github.sha }}
          
       - name: Build Web
         uses: docker/build-push-action@v6
         with:
           context: project-2-task-flow
           file: project-2-task-flow/apps/web/Dockerfile
           load: true
           tags: taskflow-web:${{ github.sha }}
           build-args: |
             VITE_API_URL=http://localhost:4000
             VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
             VITE_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

  trivy:
    needs: docker-build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Scan API Image for Vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: taskflow-api:${{ github.sha }}
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

      - name: Scan Web Image for Vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: taskflow-web:${{ github.sha }}
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL
          skip-setup-trivy: true

  push-to-dockerhub:
      if: github.event_name == 'workflow_dispatch'
      needs: trivy
      runs-on: self-hosted
      steps:
       - uses: actions/checkout@v4
       - name: Log in to Docker Hub
         uses: docker/login-action@v3
         with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
       - name: Tag & Push API
         run: |
          docker tag taskflow-api:${{ github.sha }} \
            ${{ secrets.DOCKER_USERNAME }}/taskflow-api:${{ inputs.version }}
          docker push ${{ secrets.DOCKER_USERNAME }}/taskflow-api:${{ inputs.version }}
       - name: Tag & Push Web
         run: |
          docker tag taskflow-web:${{ github.sha }} \
            ${{ secrets.DOCKER_USERNAME }}/taskflow-web:${{ inputs.version }}
          docker push ${{ secrets.DOCKER_USERNAME }}/taskflow-web:${{ inputs.version }}
